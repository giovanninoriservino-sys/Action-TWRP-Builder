name: Recovery Build

on:
  workflow_dispatch:

env:
  LIBRARY_NAME: twrp
  LIBRARY_URL: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
  LIBRARY_BRANCH: twrp-12.1
  DEVICE_URL: https://github.com/giovanninoriservino-sys/android_device_motorola_cancunf
  DEVICE_BRANCH: main
  DEVICE_PATH: device/motorola/cancunf
  DEVICE_NAME: cancunf
  MAKEFILE_NAME: twrp_cancunf
  BUILD_TARGET: vendor_bootimage

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android
        sudo apt-get clean

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib g++-multilib libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc bison build-essential curl flex git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Install Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Repo
      run: |
        mkdir workspace
        cd workspace
        git config --global user.name "Giovanni"
        git config --global user.email "giovanni@example.com"
        repo init --depth=1 -u ${{ env.LIBRARY_URL }} -b ${{ env.LIBRARY_BRANCH }}

    - name: Repo Sync
      run: |
        cd workspace
        repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

    - name: Clone e Fix Matrioska
      run: |
        cd workspace
        # 1. Pulizia totale preventiva
        rm -rf device/motorola/cancunf
        mkdir -p device/motorola/cancunf
        
        # 2. Cloniamo fuori dal percorso di build per non fare raddoppi
        git clone ${{ env.DEVICE_URL }} -b ${{ env.DEVICE_BRANCH }} /tmp/cancunf
        
        # 3. Cerchiamo dove sono i file. Se il tuo repo ha una cartella interna, la "saltiamo"
        if [ -d "/tmp/cancunf/device/motorola/cancunf" ]; then
          cp -r /tmp/cancunf/device/motorola/cancunf/* device/motorola/cancunf/
        else
          cp -r /tmp/cancunf/* device/motorola/cancunf/
        fi
        
        # 4. VERIFICA: Se vedi due AndroidProducts.mk qui, allora abbiamo fallito
        find device/motorola/cancunf -name "twrp_cancunf.mk"

    - name: Build TWRP
      run: |
        cd workspace
        
        # 1. PULIZIA E FIX INTELLIGENTE
        # Invece di cancellare tutto, forziamo i valori corretti nei file .mk del TUO device
        # Questo evita il conflitto "Should not set... if not building vendor_boot"
        find device/motorola/cancunf -name "*.mk" -exec sed -i 's/PRODUCT_BUILD_VENDOR_BOOT_IMAGE := false/PRODUCT_BUILD_VENDOR_BOOT_IMAGE := true/g' {} +
        find device/motorola/cancunf -name "*.mk" -exec sed -i 's/BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT := true/BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT := true/g' {} +
        
        # Se le righe non esistono, le aggiungiamo in fondo al BoardConfig.mk correttamente
        echo "BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT := true" >> device/motorola/cancunf/BoardConfig.mk
        echo "BOARD_INCLUDE_RECOVERY_RAMDISK_IN_VENDOR_BOOT := true" >> device/motorola/cancunf/BoardConfig.mk

        # 2. PREPARAZIONE AMBIENTE (Niente più echo in build/make/core!)
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        
        # 3. LUNCH
        # Se fallisce twrp_cancunf, usiamo il comando completo
        lunch twrp_cancunf-eng || lunch omni_cancunf-eng || true
        
        # 4. MAKE FINALE
        # Passiamo le variabili come parametri esterni (questo non è readonly)
        make vendor_bootimage -j2 \
            PRODUCT_BUILD_VENDOR_BOOT_IMAGE=true \
            BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT=true \
            BOARD_INCLUDE_RECOVERY_RAMDISK_IN_VENDOR_BOOT=true
            
    - name: Upload Recovery
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Cancunf-$(date +%Y%m%d)
        path: workspace/out/target/product/cancunf/vendor_boot.img
        
