name: Recovery Build

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  LIBRARY_NAME: twrp
  LIBRARY_URL: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
  LIBRARY_BRANCH: twrp-12.1
  DEVICE_URL: https://github.com/giovanninoriservino-sys/android_device_motorola_cancunf
  DEVICE_BRANCH: main
  DEVICE_PATH: device/motorola/cancunf
  DEVICE_NAME: cancunf
  MAKEFILE_NAME: twrp_cancunf
  BUILD_TARGET: vendorbootimage

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android
        sudo apt-get clean

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib g++-multilib libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc bison build-essential curl flex git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync micro schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Install Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Repo
      run: |
        mkdir workspace
        cd workspace
        git config --global user.name "Giovanni"
        git config --global user.email "giovanni@example.com"
        repo init --depth=1 -u ${{ env.LIBRARY_URL }} -b ${{ env.LIBRARY_BRANCH }}

    - name: Repo Sync
      run: |
        cd workspace
        repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

    - name: Clone e Fix Matrioska
      run: |
        cd workspace
        rm -rf device/motorola/cancunf
        mkdir -p device/motorola/cancunf
        git clone ${{ env.DEVICE_URL }} -b ${{ env.DEVICE_BRANCH }} /tmp/cancunf
        if [ -d "/tmp/cancunf/device/motorola/cancunf" ]; then
          cp -r /tmp/cancunf/device/motorola/cancunf/* device/motorola/cancunf/
        else
          cp -r /tmp/cancunf/* device/motorola/cancunf/
        fi

    - name: Ispezione Sorgenti Device
      run: |
        cd workspace/device/motorola/cancunf
        echo "--- CONTENUTO CARTELLA DEVICE ---"
        ls -F
        echo "--- CONTENUTO AndroidProducts.mk ---"
        cat AndroidProducts.mk
        echo "--- VERIFICA ESISTENZA MAKEFILE ---"
        ls twrp_cancunf.mk || echo "ERRORE: twrp_cancunf.mk NON TROVATO!"

    - name: Build TWRP (Forced A16 Execution)
      run: |
        cd workspace
        
        # 1. BYPASS E REGOLE BOARD
        sed -i 's/$(error Should not set BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT/$(warning Bypassed/g' build/make/core/board_config.mk
        
        # 2. SETUP AMBIENTE
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export BUILD_BROKEN_VINTF_CHECK=true
        export BUILD_BROKEN_DUP_RULES=true
        
        # 3. LUNCH
        lunch twrp_cancunf-eng

        # 4. IL "KILLER" DEL NO WORK TO DO
        # Cancelliamo i database di Ninja. Questo lo COSTRINGE a ricalcolare tutto.
        echo "=== RESETTING NINJA DATABASE ==="
        rm -rf out/.ninja_log out/.ninja_deps out/build-*.ninja
        # Cancelliamo la cartella di output specifica del device per sicurezza
        rm -rf out/target/product/cancunf/obj/PACKAGING/vendor_boot_intermediates
        
        m adbd twrp recoveryimage vendorbootimage -j2 \
        BOARD_USES_RECOVERY_AS_BOOT=false \
        BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT=true \
        PRODUCT_BUILD_VENDOR_BOOT_IMAGE=true

    - name: Debug Path
      run: |
        cd workspace
        ls -R out/target/product/cancunf/ || echo "Cartella out ancora vuota"

    - name: Upload Recovery
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: TWRP-MotoG54
        path: |
          workspace/out/target/product/cancunf/vendor_boot.img
          workspace/out/target/product/cancunf/*.img
