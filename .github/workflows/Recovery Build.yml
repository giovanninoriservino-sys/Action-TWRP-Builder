name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'URL del Manifest TWRP'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'Branch del Manifest (es. twrp-12.1)'
        required: true
        default: 'twrp-12.1'
      DEVICE_TREE_URL:
        description: 'URL del tuo Repository'
        required: true
        default: 'https://github.com/giovanninoriservino-sys/android_device_motorola_cancunf'
      DEVICE_TREE_BRANCH:
        description: 'Branch del tuo Repo'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Percorso di destinazione'
        required: true
        default: 'device/motorola/cancunf'
      DEVICE_NAME:
        description: 'Nome del dispositivo'
        required: true
        default: 'cancunf'
      MAKEFILE_NAME:
        description: 'Nome del Makefile'
        required: true
        default: 'twrp_cancunf'
      BUILD_TARGET:
        description: 'Target della build (vendor_boot)'
        required: true
        default: 'vendor_boot'

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Pulizia Workspace
      uses: rokibhasansagar/slimhub_actions@main

    - name: Installazione Dipendenze
      run: |
        sudo apt update
        sudo apt install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev lib32ncurses-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev build-essential libgtk-3-dev libglu1-mesa-dev freeglut3-dev git libxml2 lzop pngcrush schedtool squashfs-tools imagemagick libbz2-dev lzma ncftp qemu-user-static libstdc++-10-dev libncurses6 python3 tar

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Installazione Repo Tool
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Inizializzazione Sorgenti TWRP
      run: |
        mkdir workspace
        cd workspace
        git config --global user.name "Nico170420"
        git config --global user.email "b170420nc@gmail.com"
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}
        repo sync -j$(nproc --all) --force-sync

    - name: Clonazione Device Tree
      run: |
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} workspace/${{ github.event.inputs.DEVICE_PATH }}

    - name: Aumento Swap
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Esecuzione Build
      run: |
        cd workspace
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng
        make clean
        make ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)

    - name: Caricamento Release
      uses: softprops/action-gh-release@v2
      with:
        files: | 
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
        name: TWRP-${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: "Build TWRP per Moto G54 (cancunf) - Target: ${{ github.event.inputs.BUILD_TARGET }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
