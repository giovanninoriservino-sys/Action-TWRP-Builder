name: Recovery Build

on:
  workflow_dispatch:

env:
  LIBRARY_NAME: twrp
  LIBRARY_URL: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
  LIBRARY_BRANCH: twrp-12.1
  DEVICE_URL: https://github.com/giovanninoriservino-sys/android_device_motorola_cancunf
  DEVICE_BRANCH: main
  DEVICE_PATH: device/motorola/cancunf
  DEVICE_NAME: cancunf
  MAKEFILE_NAME: twrp_cancunf
  BUILD_TARGET: vendor_bootimage

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android
        sudo apt-get clean

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib g++-multilib libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc bison build-essential curl flex git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Install Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Repo
      run: |
        mkdir workspace
        cd workspace
        git config --global user.name "Giovanni"
        git config --global user.email "giovanni@example.com"
        repo init --depth=1 -u ${{ env.LIBRARY_URL }} -b ${{ env.LIBRARY_BRANCH }}

    - name: Repo Sync
      run: |
        cd workspace
        repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

    - name: Clone Device Tree
      run: |
        cd workspace
        # 1. Creiamo la struttura cartelle esatta
        mkdir -p device/motorola/cancunf
        
        # 2. Cloniamo in una cartella temporanea
        git clone ${{ env.DEVICE_URL }} -b ${{ env.DEVICE_BRANCH }} /tmp/temp_device
        
        # 3. Copiamo i file dentro la cartella creata al punto 1
        cp -r /tmp/temp_device/* device/motorola/cancunf/
        
        # 4. Verifica (per vedere nel log se ora ci sono)
        ls -R device/motorola/cancunf
        
    - name: Build TWRP
      run: |
        # --- OPERAZIONE PULIZIA TOTALE ---
        # Cancella la riga maledetta da OGNI file dentro la cartella del device
        find device/motorola/cancunf -type f -exec sed -i '/BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT/d' {} +
        find device/motorola/cancunf -type f -exec sed -i '/PRODUCT_BUILD_VENDOR_BOOT_IMAGE/d' {} +
        
        # Ora forziamo la variabile nel posto GIUSTO (il file di sistema)
        # Questo dice ad Android: "Sì, sto costruendo una vendor_boot, fidati"
        echo "PRODUCT_BUILD_VENDOR_BOOT_IMAGE := true" >> build/make/core/config.mk
        
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        
        # Prova il lunch
        lunch twrp_cancunf-eng || true
        
        # Lanciamo la build passando la variabile '902' direttamente nel comando
        make vendor_bootimage \
          BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT=true \
          -j2
        
    - name: Check Output
      run: |
        ls -lh workspace/out/target/product/${{ env.DEVICE_NAME }}/${{ env.BUILD_TARGET }}.img || echo "File non trovato!"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-VendorBoot-${{ env.DEVICE_NAME }}
        path: workspace/out/target/product/${{ env.DEVICE_NAME }}/${{ env.BUILD_TARGET }}.img
