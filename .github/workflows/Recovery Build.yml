name: Recovery Build - Giovanni Edition

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  LIBRARY_NAME: twrp
  LIBRARY_URL: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
  LIBRARY_BRANCH: twrp-12.1
  DEVICE_URL: https://github.com/giovanninoriservino-sys/android_device_motorola_cancunf
  DEVICE_BRANCH: main
  DEVICE_PATH: device/motorola/cancunf
  DEVICE_NAME: cancunf
  MAKEFILE_NAME: twrp_cancunf

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android
        sudo apt-get clean

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib g++-multilib libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc bison build-essential curl flex git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync micro schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Install Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Repo
      run: |
        mkdir workspace
        cd workspace
        git config --global user.name "Giovanni"
        git config --global user.email "giovanni@example.com"
        repo init --depth=1 -u ${{ env.LIBRARY_URL }} -b ${{ env.LIBRARY_BRANCH }}

    - name: Repo Sync
      run: |
        cd workspace
        repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

    - name: Clone Device Tree
      run: |
        cd workspace
        rm -rf ${{ env.DEVICE_PATH }}
        mkdir -p ${{ env.DEVICE_PATH }}
        git clone ${{ env.DEVICE_URL }} -b ${{ env.DEVICE_BRANCH }} /tmp/cancunf
        # Copia intelligente per evitare l'effetto matrioska
        if [ -d "/tmp/cancunf/device/motorola/cancunf" ]; then
          cp -r /tmp/cancunf/device/motorola/cancunf/* ${{ env.DEVICE_PATH }}/
        else
          cp -r /tmp/cancunf/* ${{ env.DEVICE_PATH }}/
        fi

    - name: Build TWRP
      run: |
        cd workspace
        
        # 1. KILL DEFINITIVO ERRORI 902 E 905
        # Usiamo una ricerca più aggressiva per neutralizzare BOARD_MOVE e BOARD_VENDOR_RAMDISK
        sed -i 's/$(error Should not set BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT/$(warning Bypassed 902/g' build/make/core/board_config.mk
        sed -i 's/$(error Should not set BOARD_VENDOR_RAMDISK_FRAGMENTS/$(warning Bypassed 905/g' build/make/core/board_config.mk

        # 2. SETUP AMBIENTE
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        # 3. FORZIAMO IL REFRESH (Questo dice a Android di rileggere i file .mk)
        echo "Ricaricamento prodotti..."
        make -j$(nproc) TARGET_PRODUCT=twrp_cancunf TARGET_BUILD_VARIANT=eng dumpvars
        
        # 4. LUNCH
        lunch twrp_cancunf-eng || { 
          echo "Lunch fallito, forzo variabili manuali..."
          export TARGET_PRODUCT=twrp_cancunf
          export TARGET_BUILD_VARIANT=eng
        }

        # 5. COMPILAZIONE
        # Usiamo 'm' con i parametri per la vendor_boot
        m vendorbootimage -j$(nproc) \
            PRODUCT_BUILD_VENDOR_BOOT_IMAGE=true \
            BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT=true


    - name: Check Output
      run: |
        ls -lh workspace/out/target/product/${{ env.DEVICE_NAME }}/vendor_boot.img || echo "Vendor Boot non generata"
        ls -lh workspace/out/target/product/${{ env.DEVICE_NAME }}/boot.img || echo "Boot Image non generata"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-MotoG54-Giovanni
        path: |
          workspace/out/target/product/${{ env.DEVICE_NAME }}/vendor_boot.img
          workspace/out/target/product/${{ env.DEVICE_NAME }}/boot.img
          workspace/out/target/product/${{ env.DEVICE_NAME }}/*.img
